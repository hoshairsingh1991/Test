kind = "web"
previewPath = "/"
title = "TradeTrack Pro"
version = "1.0.0"
id = "artifacts/tradetrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19746

[services.development]
run = "pnpm --filter @workspace/tradetrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradetrack", "run", "build" ]
publicDir = "artifacts/tradetrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19746"
BASE_PATH = "/"
